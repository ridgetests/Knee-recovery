<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recovery">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<title>Recovery</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--s1:#0B0B0B;--s2:#131313;--s3:#1C1C1C;--line:#181818;--t:#FFF;--t2:#5A5A5A;--t3:#2E2E2E;--green:#00E676;--amber:#FF9F0A;--red:#FF453A;--blue:#0A84FF;--purple:#BF5AF2}
html,body{height:100%;background:var(--bg);overscroll-behavior:none}
body{font-family:'Inter',-apple-system,sans-serif;color:var(--t);overflow:hidden;-webkit-font-smoothing:antialiased;font-weight:400;letter-spacing:-.01em}
#app{height:100%;display:flex;flex-direction:column}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(74px + env(safe-area-inset-bottom))}
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--line);display:flex;padding:7px 0 calc(7px + env(safe-area-inset-bottom));z-index:99}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;padding:3px 0;-webkit-user-select:none;user-select:none}
.nt svg{width:20px;height:20px;stroke-width:1.5}
.nt-lbl{font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.lbl{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--t2)}
.lbl-dim{font-size:10px;font-weight:400;letter-spacing:.15em;text-transform:uppercase;color:var(--t3)}
.card{background:var(--s1);border-radius:16px;padding:16px;margin:0 12px 8px;border:1px solid var(--line)}
.pbar{background:var(--s3);border-radius:2px;height:2px;overflow:hidden}
.pbf{height:2px;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.row{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s cubic-bezier(.4,0,.2,1)}
.exr{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;-webkit-user-select:none;user-select:none}
.exr:last-child{border-bottom:none;padding-bottom:2px}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;appearance:none;background:var(--s3);border-radius:2px;outline:none;cursor:pointer;margin:6px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.6)}
input[type=number],input[type=text]{background:var(--s2);border:1px solid var(--s3);border-radius:10px;padding:11px 12px;color:#fff;font-family:inherit;font-size:15px;font-weight:400;width:100%;outline:none;-webkit-appearance:none}
input[type=number]{font-size:20px;font-weight:500}
textarea{width:100%;border:none;outline:none;font-family:inherit;font-size:14px;color:#bbb;resize:none;min-height:44px;background:transparent;line-height:1.55;font-weight:400}
textarea::placeholder{color:var(--t3)}
.seg{display:flex;background:var(--s3);border-radius:9px;padding:2px;cursor:pointer;-webkit-user-select:none;user-select:none}
.seg span{font-size:9px;font-weight:600;padding:4px 9px;border-radius:7px;transition:all .2s;letter-spacing:.03em;white-space:nowrap}
.tap{cursor:pointer;-webkit-user-select:none;user-select:none;transition:transform .1s}
.tap:active{transform:scale(.97)}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.rise{animation:rise .35s cubic-bezier(.2,.8,.2,1) both}
.ringwrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.diaryin{background:var(--s2);border:1px solid var(--s3);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.diaryin textarea{min-height:22px;font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div id="scroll"><div id="view"></div></div>
  <nav id="nav">
    <button class="nt" onclick="sw('today')"><svg id="ni-today" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg><span class="nt-lbl" id="nl-today">Today</span></button>
    <button class="nt" onclick="sw('log')"><svg id="ni-log" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg><span class="nt-lbl" id="nl-log">Log</span></button>
    <button class="nt" onclick="sw('streaks')"><svg id="ni-streaks" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3s5 4 5 9a5 5 0 01-10 0c0-2 1-3 1-3s0 2 2 2 1-4 2-5z"/></svg><span class="nt-lbl" id="nl-streaks">Momentum</span></button>
    <button class="nt" onclick="sw('build')"><svg id="ni-build" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3 7h7l-5.5 4.5L18.5 21 12 16.5 5.5 21l2-7.5L2 9h7z"/></svg><span class="nt-lbl" id="nl-build">Build</span></button>
    <button class="nt" onclick="sw('plan')"><svg id="ni-plan" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span class="nt-lbl" id="nl-plan">Plan</span></button>
  </nav>
</div>
<script>
const SG=new Date('2026-07-20T06:00:00'),PG=150,CPC=52.65,ALC_SAVE=5;
const gd=()=>Math.floor((Date.now()-SG)/86400000);
const todayKey=()=>new Date().toISOString().slice(0,10);
const tk=()=>'rx4_'+todayKey();
const dOff=o=>{const d=new Date();d.setDate(d.getDate()-o);return d.toISOString().slice(0,10)};
const df=s=>{const[y,m,d]=s.split('-');return Math.ceil((new Date(y,m-1,d)-new Date())/86400000)};
const fsh=s=>{const[y,m,d]=s.split('-');return new Date(y,m-1,d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})};
const ff=s=>{const[y,m,d]=s.split('-');return new Date(y,m-1,d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})};
const fm=n=>'£'+Math.floor(n).toLocaleString('en-GB');

const PH=[
  {id:'preop',n:'Pre-surgery prep',s:'Pre-op',c:'#FF6B35',start:-9999,end:0,ek:'preop',d:'Build strength, cut swelling, arrive light. Every day now pays off on the table.'},
  {id:'p1',n:'Protection',s:'Phase 1',c:'#FF453A',start:0,end:42,ek:'ph1',d:'Non-weight-bearing. Four repairs knitting in. Protect them — ice, elevate, activate.'},
  {id:'p2',n:'Early mobilisation',s:'Phase 2',c:'#FF9F0A',start:42,end:90,ek:'ph2',d:'Weight bearing begins. Rebuild range. Careful, progressive loading.'},
  {id:'p3',n:'Strength building',s:'Phase 3',c:'#30D158',start:90,end:180,ek:'ph3',d:'Jogging at 3 months. Gym work. Progress you can finally feel.'},
  {id:'p4',n:'Sport preparation',s:'Phase 4',c:'#0A84FF',start:180,end:270,ek:'ph4',d:'Running. Agility. Getting your body back.'},
  {id:'p5',n:'Return to sport',s:'Phase 5',c:'#BF5AF2',start:270,end:365,ek:'ph5',d:'Football. PalmerSport. Everything this was for.'},
];
const PD=['Now — 19 Jul 2026','20 Jul — 31 Aug 2026','1 Sep — 17 Oct 2026','18 Oct 2026 — 17 Jan 2027','18 Jan — 17 Apr 2027','18 Apr — 20 Jul 2027'];
const gp=d=>PH.find(p=>d>=p.start&&d<p.end)||PH[PH.length-1];

// Rotating status subtitles, phase-aware, in Steve's dry voice
const SUBS={
  preop:['Arrive light, arrive strong.','The fitter you go in, the faster you come out.','Nothing to do now but prepare well.','Bank the strength. You\'ll want it.'],
  ph1:['Four repairs, knitting in. Leave them be.','The hardest weeks. They pass.','Do less, heal more. This once.','The graft is weakest now. Protect it.'],
  ph2:['Weight through it again. Slowly.','Range first, strength later.','Small gains count double now.','The knee remembers. Remind it gently.'],
  ph3:['Jogging soon. You\'ve earned it.','Now it starts giving something back.','Strength returns. Bank it.','The body you\'re rebuilding is better than before.'],
  ph4:['Running. Properly.','Nearly you again.','Agility now. The fun part.','Summer 2027 is close enough to see.'],
  ph5:['Football. PalmerSport. All of it.','This is what it was for.','Stronger than before the injury.','You did the whole year. Go.'],
};

const EX={
  preop:[{id:'qc',l:'Quad contractions',d:'3×10, hold 5s'},{id:'ap',l:'Ankle pumps',d:'Every waking hour'},{id:'ice',l:'Ice knee 4×',d:'20 min on, 40 off'},{id:'elev',l:'Leg elevated',d:'Above heart — BoneFoam'},{id:'ub',l:'Upper body session',d:'Battle ropes / seated weights'}],
  ph1:[{id:'ap',l:'Ankle pumps',d:'Every hour — prevents DVT'},{id:'qc',l:'Quad contractions',d:'3×10, hold 5s, 3× today'},{id:'slr',l:'Straight leg raises',d:'3×10, 2× today'},{id:'ice',l:'Ice 4× daily',d:'20 min sessions'},{id:'elev',l:'Leg elevated',d:'Heel on BoneFoam, knee free'},{id:'hs',l:'Heel slides',d:'Gentle — within limit'}],
  ph2:[{id:'wb',l:'Weight-bearing walk',d:'Progressive with crutches'},{id:'bike',l:'Stationary bike',d:'Low resistance, 10-20 min'},{id:'vmo',l:'VMO activation',d:'Inner quad focus'},{id:'rom',l:'Range of motion',d:'Target 0-120° by wk 12'},{id:'bal',l:'Single-leg balance',d:'Good leg first'},{id:'ice',l:'Ice after exercise',d:'20 min post-activity'}],
  ph3:[{id:'jw',l:'Jog-walk intervals',d:'1 min jog, 2 min walk'},{id:'lp',l:'Leg press 0-90°',d:'No deeper than 90°'},{id:'hc',l:'Hamstring curls',d:'Graft protection'},{id:'prop',l:'Proprioception',d:'Balance board work'},{id:'swim',l:'Swimming',d:'Freestyle only'}],
  ph4:[{id:'run',l:'Running session',d:'Build distance and pace'},{id:'agil',l:'Agility drills',d:'Lateral movement'},{id:'gym',l:'Full gym session',d:'Lower body programme'},{id:'sport',l:'Sport drills',d:'Football with physio'}],
  ph5:[{id:'sport',l:'Sport training',d:'Return to football'},{id:'ps',l:'PalmerSport prep',d:'Track day conditioning'},{id:'maint',l:'Strength maintenance',d:'Keep the graft strong'}],
};
const LM=[
  {date:'2026-07-20',l:'Surgery',s:'Royal Surrey · Mr Sibbel',pk:true},
  {date:'2026-08-31',l:'Weight bearing',s:'6 weeks post-op'},
  {date:'2026-09-14',l:'Driving',s:'Right leg — cleared'},
  {date:'2026-10-20',l:'Jogging',s:'3 months post-op'},
  {date:'2027-01-20',l:'Running',s:'6 months post-op'},
  {date:'2027-04-20',l:'Sport training',s:'9 months post-op'},
  {date:'2027-07-20',l:'PalmerSport',s:'The summit — 12 months',pk:true},
];
const SYM=[
  {k:'pain',l:'Pain',min:0,max:10,c:'#FF453A',lb:['None','','Very mild','','Mild','','Moderate','','Considerable','','Severe']},
  {k:'swelling',l:'Swelling',min:1,max:5,c:'#FF9F0A',lb:['','None','Minimal','Moderate','Significant','Severe']},
  {k:'rom',l:'Range of motion',min:1,max:5,c:'#30D158',lb:['','Very limited','Limited','Moderate','Good','Full range']},
  {k:'mood',l:'Mood',min:1,max:5,c:'#0A84FF',lb:['','Very low','Low','OK','Good','Great']},
  {k:'sleep',l:'Sleep',min:1,max:5,c:'#BF5AF2',lb:['','Very poor','Poor','OK','Good','Excellent']},
  {k:'energy',l:'Energy',min:1,max:5,c:'#FF6B35',lb:['','None','Very low','Moderate','Good','High']},
];
const FOODS=[{l:'Chicken 150g',g:35},{l:'Whey shake',g:25},{l:'2 eggs',g:12},{l:'Greek yoghurt',g:17},{l:'Salmon 150g',g:30},{l:'Cottage cheese',g:14}];
const SC=[{k:'vitc',l:'Vit C',c:'#FF9F0A'},{k:'omega3',l:'Omega 3',c:'#0A84FF'},{k:'multi',l:'Multi',c:'#30D158'}];
const ML=['','Very low','Low','OK','Good','Great'];

// Surgery detail — the four-part reconstruction
const SURGERY_PARTS=[
  {n:'ACL reconstruction',d:'Rebuilt using a graft from your quad tendon'},
  {n:'Meniscus root repair',d:'Torn clean off the bone — pinned back into place'},
  {n:'MCL repair',d:'Medial ligament tear repaired'},
  {n:'Chondral fixation',d:'Loose cartilage fragment retrieved and reattached — protects against bone-on-bone'},
];

const DS={exercises:{},customEx:[],symptoms:{pain:3,swelling:2,rom:3,mood:3,sleep:3,energy:3},moodLogged:false,protein:0,supplements:{vitc:false,omega3:false,multi:false},brace:true,notes:'',alcoholFree:null,movedToday:null,scrollOk:null,diary:{good1:'',good2:'',good3:'',smile:'',free:''},builtToday:''};
const CFG_DEF={weightStart:null,weightTarget:80,fundGoal:'Swiss holiday',commutePerWeek:1,weights:{},onMounjaro:false,physioStatus:'planning',physioLog:[],physioNotes:'',projects:[]};

let S={...DS},CFG={...CFG_DEF},TAB='today';
</script>
<script>
function load(){
  try{const r=localStorage.getItem(tk());if(r)S={...DS,...JSON.parse(r)};}catch(e){}
  if(!S.diary)S.diary={good1:'',good2:'',good3:'',smile:'',free:''};
  try{const c=localStorage.getItem('rx4_cfg');if(c)CFG={...CFG_DEF,...JSON.parse(c)};}catch(e){}
}
function save(){try{localStorage.setItem(tk(),JSON.stringify(S));}catch(e){}}
function saveCfg(){try{localStorage.setItem('rx4_cfg',JSON.stringify(CFG));}catch(e){}}
function getDay(o){try{const r=localStorage.getItem('rx4_'+dOff(o));return r?JSON.parse(r):null;}catch(e){return null;}}

function allEx(){const base=EX[gp(gd()).ek]||[];return base.concat((CFG.customEx||[]).map(e=>({...e,physio:true})));}
function addCustomEx(){var l=document.getElementById('cxLabel');var d=document.getElementById('cxDetail');if(!l||!l.value.trim())return;CFG.customEx=CFG.customEx||[];CFG.customEx.push({id:'cx'+Date.now(),l:l.value.trim(),d:(d&&d.value.trim())||'Physio-prescribed'});saveCfg();renderToday();}
function delCustomEx(id){CFG.customEx=(CFG.customEx||[]).filter(function(e){return e.id!==id});delete S.exercises[id];save();saveCfg();renderToday();}
function toggleExEdit(){window._exEdit=!window._exEdit;renderToday();}
function commuteMoney(){const d=gd();if(d<=0)return 0;return Math.floor((d/7)*CFG.commutePerWeek*CPC);}
function alcoholMoney(){let n=0;if(S.alcoholFree)n++;for(let i=1;i<=400;i++){const st=getDay(i);if(st&&st.alcoholFree)n++;else if(st&&st.alcoholFree===false)continue;}return n*ALC_SAVE;}
// simpler: count all alcohol-free days ever logged
function alcoholFreeDays(){let n=S.alcoholFree?1:0;for(let i=1;i<=400;i++){const st=getDay(i);if(st&&st.alcoholFree)n++;}return n;}
function fundTotal(){return commuteMoney()+alcoholFreeDays()*ALC_SAVE;}

function todayScore(){
  const exs=allEx();
  const done=exs.filter(e=>S.exercises[e.id]).length;
  const exPct=exs.length?done/exs.length:0;
  let sc=0;
  sc+=exPct*35;
  sc+=Math.min(S.protein/PG,1)*20;
  sc+=S.movedToday?15:0;
  sc+=S.alcoholFree?15:0;
  sc+=S.moodLogged?15:0;
  return Math.round(sc);
}
function scoreFor(st,dn){
  if(!st)return 0;
  const ph=gp(dn);const exs=(EX[ph.ek]||[]).concat(CFG.physioEx||[]);
  const done=exs.filter(e=>st.exercises&&st.exercises[e.id]).length;
  const exPct=exs.length?done/exs.length:0;
  let sc=0;sc+=exPct*35;sc+=Math.min((st.protein||0)/PG,1)*20;sc+=st.movedToday?15:0;sc+=st.alcoholFree?15:0;sc+=st.moodLogged?15:0;
  return Math.round(sc);
}
function streak(check){
  let n=0;
  if(check(S,gd()))n++;
  else{for(let i=1;i<=400;i++){const st=getDay(i);if(st&&check(st,gd()-i))n++;else break;}return n;}
  for(let i=1;i<=400;i++){const st=getDay(i);if(st&&check(st,gd()-i))n++;else break;}
  return n;
}
const chkAlc=st=>st.alcoholFree===true;
const chkEx=(st,dn)=>{const ph=gp(dn);const exs=(EX[ph.ek]||[]).concat(CFG.physioEx||[]);if(!exs.length)return false;const done=exs.filter(e=>st.exercises&&st.exercises[e.id]).length;return done/exs.length>=0.8;};
const chkProt=st=>(st.protein||0)>=PG;
const chkMove=st=>st.movedToday===true;
function scoreHistory(n){const arr=[];for(let i=n-1;i>=1;i--){arr.push(scoreFor(getDay(i),gd()-i));}arr.push(todayScore());return arr;}

// F1 drift detection — returns array of gentle flags
function drifts(){
  const out=[];
  // protein: 3 days under target
  let pMiss=0;for(let i=1;i<=3;i++){const st=getDay(i);if(st&&(st.protein||0)<PG*0.7)pMiss++;}
  if(pMiss>=3)out.push({t:'Protein\'s been light 3 days running',s:'Tissue repair needs it. Easy win today.',c:'var(--amber)'});
  // sleep: 3 days poor
  let slMiss=0;for(let i=1;i<=3;i++){const st=getDay(i);if(st&&st.symptoms&&(st.symptoms.sleep||3)<=2)slMiss++;}
  if(slMiss>=3)out.push({t:'Sleep\'s been rough for a few days',s:'It usually shows up in mood next. Worth an early night.',c:'var(--purple)'});
  // mood: 3 days low
  let mMiss=0;for(let i=1;i<=3;i++){const st=getDay(i);if(st&&st.symptoms&&(st.symptoms.mood||3)<=2)mMiss++;}
  if(mMiss>=3)out.push({t:'Mood\'s been low this week',s:'Normal in a hard phase. A walk outside and the diary help more than they should.',c:'var(--blue)'});
  return out;
}

function tex(id){
  S.exercises[id]=!S.exercises[id];save();
  const exs=allEx(),ph=gp(gd());
  const done=exs.filter(e=>S.exercises[e.id]).length,tot=exs.length,pct=tot?Math.round(done/tot*100):0;
  const dot=document.getElementById('ex-'+id);
  if(dot){dot.style.background=S.exercises[id]?ph.c:'transparent';dot.style.borderColor=S.exercises[id]?ph.c:'var(--t3)';dot.innerHTML=S.exercises[id]?'<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="2,5.5 4.3,8 9,3" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':'';}
  const nm=document.getElementById('exn-'+id);if(nm){nm.style.color=S.exercises[id]?'var(--t3)':'#fff';nm.style.textDecoration=S.exercises[id]?'line-through':'none';}
  const xb=document.getElementById('xbar'),xc=document.getElementById('xcnt');if(xb)xb.style.width=pct+'%';if(xc)xc.textContent=done+'/'+tot;
  updateRing();
}
function updateRing(){const sc=todayScore();const el=document.getElementById('scoreNum');if(el)el.textContent=sc;const ring=document.getElementById('scoreArc');if(ring){const circ=2*Math.PI*52;ring.style.strokeDashoffset=circ*(1-sc/100);const col=sc>=80?'var(--green)':sc>=50?'var(--amber)':sc>0?'#FF6B35':'var(--t3)';ring.style.stroke=col;if(el)el.style.color=col;}}
function tgl(k){S[k]=!S[k];save();renderToday();}
function tsupp(k,el){S.supplements[k]=!S.supplements[k];save();const sc=SC.find(s=>s.k===k);if(el){el.style.background=S.supplements[k]?sc.c:'transparent';el.style.borderColor=S.supplements[k]?sc.c:'var(--s3)';el.style.color=S.supplements[k]?'#000':'var(--t2)';el.textContent=(S.supplements[k]?'✓ ':'')+sc.l;}}
function addP(g){S.protein=Math.max(0,Math.min(300,S.protein+g));save();const n=document.getElementById('pnum'),b=document.getElementById('pb');if(n){n.textContent=S.protein;n.style.color=S.protein>=PG?'var(--green)':'#fff';}if(b){b.style.width=Math.min(S.protein/PG*100,100)+'%';b.style.background=S.protein>=PG?'var(--green)':'var(--blue)';}}
function uNote(v){S.notes=v;save();}
function uSym(k,v){S.symptoms[k]=parseInt(v);if(k==='mood')S.moodLogged=true;save();const sym=SYM.find(s=>s.k===k);if(sym){const el=document.getElementById('sv-'+k);const tag=sym.lb[parseInt(v)]||v;if(el)el.textContent=v+(sym.min===0?'/10':'/5')+' · '+tag;}}
function uDiary(k,v){S.diary[k]=v;save();}
function uBuilt(v){S.builtToday=v;save();}
function setCom(n){CFG.commutePerWeek=n;saveCfg();renderToday();}
function saveWeight(){const v=parseFloat(document.getElementById('wIn').value);if(v>0){CFG.weights[todayKey()]=v;if(!CFG.weightStart)CFG.weightStart=v;saveCfg();renderStreaks();}}
function toggleMounjaro(){CFG.onMounjaro=!CFG.onMounjaro;saveCfg();renderStreaks();}
function setPhysio(st){CFG.physioStatus=st;saveCfg();renderBuild();}
function addPhysioSession(){const d=document.getElementById('psDate').value||todayKey();CFG.physioLog=CFG.physioLog||[];CFG.physioLog.unshift({date:d,note:document.getElementById('psNote').value||''});saveCfg();renderBuild();}
function uPhysioNotes(v){CFG.physioNotes=v;saveCfg();}
function addProject(){const v=document.getElementById('projIn').value.trim();if(v){CFG.projects=CFG.projects||[];CFG.projects.unshift({t:v,done:false,date:todayKey()});saveCfg();renderBuild();}}
function toggleProject(i){CFG.projects[i].done=!CFG.projects[i].done;saveCfg();renderBuild();}
function delProject(i){CFG.projects.splice(i,1);saveCfg();renderBuild();}

  <div id="wInWrap" style="display:none;gap:8px;margin-top:14px">
    <input type="number" id="wIn" placeholder="Today's weight" step="0.1" style="flex:1">
    <button class="tap" onclick="saveWeight();document.getElementById('wInWrap').style.display='none'" style="padding:0 20px;border-radius:10px;border:none;background:var(--green);color:#000;font-weight:600;font-family:inherit;cursor:pointer">Save</button>
  </div>
  ${(()=>{const bar=startW&&latestW?Math.max(0,Math.min(100,(startW-latestW)/(startW-CFG.weightTarget)*100)):0;return `<div class="pbar" style="margin-top:16px"><div class="pbf" style="width:${bar}%;background:var(--green)"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px"><span class="lbl-dim">${startW}kg start</span><span class="lbl-dim">${CFG.weightTarget}kg goal</span></div>`;})()}
  <div class="tap" onclick="toggleMounjaro()" style="display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)">
    <div style="width:18px;height:18px;border-radius:5px;border:1.5px solid ${CFG.onMounjaro?'var(--green)':'var(--t3)'};background:${CFG.onMounjaro?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center">${CFG.onMounjaro?'<svg width="10" height="10" viewBox="0 0 11 11"><polyline points="2,5.5 4.3,8 9,3" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
    <span style="font-size:13px;color:var(--t2)">On Mounjaro</span>
  </div>
</div>`}

<div style="height:6px"></div>
</div>`;
}
</script>
<script>
function renderBuild(){
  const projects=CFG.projects||[];
  const activeP=projects.filter(p=>!p.done).length;
  const doneP=projects.filter(p=>p.done).length;
  const ps=CFG.physioStatus||'planning';
  const plog=CFG.physioLog||[];

  document.getElementById('view').innerHTML=
`<div class="rise" style="padding:max(16px,env(safe-area-inset-top)) 0 0">
<div style="padding:8px 16px 14px">
  <div style="font-size:23px;font-weight:600;letter-spacing:-.6px">Build</div>
  <div class="lbl" style="margin-top:5px">Use the year. Don't just heal it.</div>
</div>

<div class="card" style="background:linear-gradient(135deg,#0D0D14,#0A0A0A);border-color:#1A1A2E">
  <div style="font-size:13px;color:#ccc;line-height:1.6">The knee is one track. You are the other. A day where the body did nothing but you made something still moved you forward. This is where that counts.</div>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="lbl">Projects & ideas</div>
    <div style="font-size:12px;color:var(--t2)">${activeP} active${doneP?' · '+doneP+' shipped':''}</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <input type="text" id="projIn" placeholder="A thing to build, learn or earn from…" style="flex:1" onkeydown="if(event.key==='Enter')addProject()">
    <button class="tap" onclick="addProject()" style="padding:0 18px;border-radius:10px;border:none;background:#fff;color:#000;font-weight:600;font-family:inherit;cursor:pointer;font-size:14px">Add</button>
  </div>
  ${projects.length?projects.map((p,i)=>`
  <div style="display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)">
    <div class="tap chk" onclick="toggleProject(${i})" style="border-color:${p.done?'var(--green)':'var(--t3)'};background:${p.done?'var(--green)':'transparent'};margin-top:1px">${p.done?'<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="2,5.5 4.3,8 9,3" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:400;color:${p.done?'var(--t3)':'#fff'};text-decoration:${p.done?'line-through':'none'};line-height:1.35">${p.t}</div>
      <div class="lbl-dim" style="margin-top:3px;text-transform:none;letter-spacing:0">${p.done?'shipped':'added '+fsh(p.date)}</div>
    </div>
    <div class="tap" onclick="delProject(${i})" style="color:var(--t3);font-size:18px;padding:0 4px;line-height:1">×</div>
  </div>`).join(''):'<div style="text-align:center;padding:20px 0;color:var(--t3);font-size:13px;line-height:1.6">Nothing yet.<br>A Claude project. A Lotus thread. A business idea.<br>Whatever keeps the maker in you alive.</div>'}
</div>

<div class="card">
  <div class="lbl" style="margin-bottom:6px">What did you build today?</div>
  <div style="font-size:11px;color:var(--t3);margin-bottom:10px;line-height:1.5">One line. Kept as a record of the year not wasted.</div>
  <div class="diaryin"><textarea placeholder="Even something small…" oninput="uBuilt(this.value)">${S.builtToday||''}</textarea></div>
</div>

<div style="padding:12px 16px 6px"><div class="lbl">Physiotherapy</div></div>
${ps!=='booked'?`
<div class="card" style="border-color:#1A1420">
  <div style="display:flex;gap:11px;align-items:flex-start;margin-bottom:14px">
    <span style="font-size:18px">📌</span>
    <div>
      <div style="font-size:14px;font-weight:500;color:var(--purple)">Book private physio</div>
      <div style="font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5">Your consultant flagged it as one of the highest-leverage things you can do. For a four-part repair — ACL, meniscus root, MCL, chondral — NHS cadence is often too slow to catch loading errors early. Weekly private eyes on the knee is what protects the fixation and speeds the return.</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="tap" onclick="setPhysio('booked')" style="flex:1;padding:11px;border-radius:11px;border:1px solid var(--purple);background:var(--purple);color:#000;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">I've booked it</button>
    <button class="tap" onclick="setPhysio('planning')" style="flex:1;padding:11px;border-radius:11px;border:1px solid ${ps==='planning'?'var(--t2)':'var(--s3)'};background:transparent;color:var(--t2);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer">Still planning</button>
  </div>
</div>`:`
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:14px;font-weight:500;color:var(--green)">✓ Physio booked</div>
    <div style="font-size:12px;color:var(--t2)">${plog.length} session${plog.length===1?'':'s'} logged</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <input type="date" id="psDate" value="${todayKey()}" style="flex:1;background:var(--s2);border:1px solid var(--s3);border-radius:10px;padding:10px;color:#fff;font-family:inherit;font-size:13px">
    <button class="tap" onclick="addPhysioSession()" style="padding:0 18px;border-radius:10px;border:none;background:var(--purple);color:#000;font-weight:600;font-family:inherit;cursor:pointer;font-size:13px">Log</button>
  </div>
  <input type="text" id="psNote" placeholder="What they worked on / prescribed…" style="margin-bottom:14px">
  ${plog.length?plog.slice(0,5).map(s=>`<div style="padding:9px 0;border-top:1px solid var(--line)"><div style="font-size:13px;color:#ddd">${fsh(s.date)}</div>${s.note?`<div style="font-size:12px;color:var(--t2);margin-top:2px">${s.note}</div>`:''}</div>`).join(''):''}
</div>`}
<div class="card">
  <div class="lbl" style="margin-bottom:10px">Physio notes & questions</div>
  <textarea style="min-height:70px" oninput="uPhysioNotes(this.value)" placeholder="Exercises they've prescribed, questions for next session, progress they've noted...">${CFG.physioNotes||''}</textarea>
</div>
<div style="height:6px"></div>
</div>`;
}
</script>
<script>
function renderPlan(){
  const days=gd();
  document.getElementById('view').innerHTML=
`<div class="rise" style="padding:max(16px,env(safe-area-inset-top)) 0 0">
<div style="padding:8px 16px 14px">
  <div style="font-size:23px;font-weight:600;letter-spacing:-.6px">The road back</div>
  <div class="lbl" style="margin-top:5px">May 2026 → July 2027 · 14 months</div>
</div>

<div class="card">
  <div class="lbl" style="margin-bottom:12px">Your surgery — 20 July</div>
  <div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:14px">Four repairs in one operation. Mr Sibbel, Royal Surrey.</div>
  ${SURGERY_PARTS.map((p,i)=>`<div style="display:flex;gap:11px;padding:10px 0;border-top:1px solid var(--line)">
    <div style="width:20px;height:20px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--t2);flex-shrink:0">${i+1}</div>
    <div><div style="font-size:14px;font-weight:500;color:#fff">${p.n}</div><div style="font-size:12px;color:var(--t2);margin-top:2px;line-height:1.45">${p.d}</div></div>
  </div>`).join('')}
</div>

${PH.map((p,i)=>{const cur=days>=p.start&&days<p.end;const done=days>=p.end;return`
<div style="border-radius:14px;padding:13px 15px;margin:0 12px 7px;background:${cur?'var(--s2)':'var(--s1)'};border:1px solid ${cur?p.c:'var(--line)'};border-left:3px solid ${cur?p.c:done?'#2A2A2A':'var(--s3)'};opacity:${done?.5:1}">
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:7px;height:7px;border-radius:50%;background:${cur||done?p.c:'var(--s3)'};flex-shrink:0"></div>
    <span style="font-size:13px;font-weight:500;color:${cur?'#fff':'var(--t2)'}">${p.n}</span>
    ${cur?`<span style="margin-left:auto;font-size:8px;font-weight:600;padding:3px 9px;border-radius:9px;background:${p.c};color:#000;letter-spacing:.1em">NOW</span>`:done?`<span style="margin-left:auto;font-size:14px;color:${p.c}">✓</span>`:''}
  </div>
  <div class="lbl-dim" style="padding-left:15px;margin-top:4px">${PD[i]}</div>
  ${cur?`<div style="font-size:12px;color:#888;padding-left:15px;margin-top:7px;line-height:1.5">${p.d}</div>`:''}
</div>`}).join('')}

<div style="padding:12px 16px 6px"><div class="lbl">Landmarks</div></div>
${LM.map((m)=>{const d=df(m.date),past=d<-1;return`
<div class="row" style="opacity:${past?.3:1};border-color:var(--line);${m.pk?'background:linear-gradient(90deg,rgba(191,90,242,.06),transparent)':''}">
  <div style="flex:1">
    <div style="font-size:15px;font-weight:${m.pk?'600':'500'};color:#fff">${m.pk?'★ ':''}${m.l}</div>
    <div class="lbl-dim" style="margin-top:2px">${m.s}</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:11px;color:var(--t2);margin-bottom:2px">${ff(m.date)}</div>
    ${!past?`<div style="font-size:12px;font-weight:500;color:${d<30?'var(--amber)':'var(--t2)'}">${d<=0?'Today':d<31?'In '+d+' days':d<365?'In '+Math.round(d/30.4)+' months':'In '+(d/365).toFixed(1)+' yrs'}</div>`:'<div style="font-size:12px;color:var(--t3)">Done</div>'}
  </div>
</div>`}).join('')}
<div style="height:6px"></div>
</div>`;
}

function render(){if(TAB==='today')renderToday();else if(TAB==='log')renderLog();else if(TAB==='streaks')renderStreaks();else if(TAB==='build')renderBuild();else renderPlan();}
function sw(t){TAB=t;document.getElementById('scroll').scrollTop=0;const ph=gp(gd());['today','log','streaks','build','plan'].forEach(v=>{const on=v===t;const ic=document.getElementById('ni-'+v),lb=document.getElementById('nl-'+v);if(ic)ic.style.color=on?ph.c:'var(--t3)';if(lb)lb.style.color=on?ph.c:'var(--t3)';});render();}

load();
render();
const ph0=gp(gd());
document.getElementById('ni-today').style.color=ph0.c;
document.getElementById('nl-today').style.color=ph0.c;
['log','streaks','build','plan'].forEach(v=>{document.getElementById('ni-'+v).style.color='var(--t3)';document.getElementById('nl-'+v).style.color='var(--t3)';});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
</script>
</body>
</html>
